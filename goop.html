<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Liquid Gradient</title>

  <style>
    :root {
      --c1: #ed3ea1;
      --c2: #ef0fca;
      --c3: #6c0ed2;
      --c4: #2b0554;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #0b1020;
      font-family: system-ui;
    }

    .container {
      position: relative;
      width: 1024px;
      height: 1024px;
    }

    canvas {
      width: 100%;
      height: 100%;
      display: block;
      background: black;
    }

    /* 🔥 The icon overlay */
    .icon {
      position: absolute;
      top: 50%;
      left: 50%;

      width: 10%;
      height: 10%;

      transform: translate(-50%, -50%);
      border-radius: 20%;

      object-fit: cover;
      pointer-events: none;

      /* optional polish */
      box-shadow: 0 8px 30px rgba(0,0,0,0.4);
    }

    .label {
      margin-top: 12px;
      color: rgba(255,255,255,0.7);
      font-size: 14px;
      text-align: center;
    }
  </style>
</head>
<body>

  <div>
    <div class="container">
      <canvas id="canvas" width="1024" height="1024"></canvas>

      <!-- ✅ Overlayed icon -->
      <img class="icon" src="openmusic_icon.webp" />
    </div>

    <div class="label">WebGL liquid + overlay icon</div>
  </div>

  <script src="liquid.js"></script>

  <script>
    const canvas = document.getElementById("canvas");
    const gl = canvas.getContext("webgl2");

    Liquid.init(canvas, gl);

    function render(t) {
      Liquid.step(t * 2);
      requestAnimationFrame(render);
    }

    requestAnimationFrame(render);
  </script>

</body>
</html>
