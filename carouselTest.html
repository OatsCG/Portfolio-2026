<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Carousel Test</title>
  <link rel="stylesheet" href="carousel.css" />
  <style>
    html,
    body {
      margin: 0;
      min-height: 100vh;
      background: #4a0b0b;
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: white;
    }

    body {
      display: grid;
      place-items: center;
      padding: 2rem;
    }

    .demo-wrapper {
      width: 50%;
      height: 30%;
      /* min-width: 320px;
      min-height: 380px; */
      position: relative;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }
  </style>
</head>

<body>
  <div class="demo-wrapper">
    <div class="carousel-shell" id="carouselShell">
      <div class="carousel" id="carousel">
        <div class="carousel-track" id="carouselTrack">
          <div class="carousel-entry" data-index="0">
            <img class="carousel-image" src="https://picsum.photos/seed/one/540/960" alt="Mountain scene" />
            <div class="carousel-caption">Quiet mountain morning with soft sunlight spilling over forested slopes.</div>
          </div>
          <div class="carousel-entry" data-index="1">
            <img class="carousel-image" src="https://picsum.photos/seed/two/540/960" alt="City street" />
            <div class="carousel-caption">Urban evening walk among glowing windows and rainy reflections.</div>
          </div>
          <div class="carousel-entry" data-index="2">
            <img class="carousel-image" src="https://picsum.photos/seed/three/540/960" alt="Still lake" />
            <div class="carousel-caption">A quiet lakeside moment framed by gentle mist and mirrored water.</div>
          </div>
          <div class="carousel-entry" data-index="3">
            <img class="carousel-image" src="https://picsum.photos/seed/four/540/960" alt="Desert dunes" />
            <div class="carousel-caption">Warm desert dunes shaped by wind, glowing under a late afternoon sky.</div>
          </div>
        </div>
      </div>
      <div class="carousel-bars" id="carouselBars"></div>
    </div>
  </div>

  <script src="carousel.js"></script>
  <script>
    initCarousel('#carouselTrack', '#carouselBars', '#carouselShell');
  </script>
</body>

</html>
